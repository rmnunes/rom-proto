name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Build + test C++ ──────────────────────────────────────
  cpp:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            compiler: msvc
            cmake_args: ""
          - os: ubuntu-latest
            compiler: gcc
            cmake_args: -DCMAKE_C_COMPILER=gcc-12 -DCMAKE_CXX_COMPILER=g++-12
          - os: ubuntu-latest
            compiler: clang
            cmake_args: -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++

    name: C++ (${{ matrix.compiler }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure --parallel
        timeout-minutes: 5

  # ── TypeScript type-check ─────────────────────────────────
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Type check
        working-directory: bindings/wasm
        run: |
          npm install --save-dev typescript
          npx tsc --noEmit --skipLibCheck

  # ── .NET build + test ────────────────────────────────────
  dotnet:
    name: .NET
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Build shared C++ library
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON -DCMAKE_POSITION_INDEPENDENT_CODE=ON
          cmake --build build --config Release --target rom --parallel

      - name: Build & Test .NET
        working-directory: bindings/dotnet
        run: |
          dotnet build -c Release
          dotnet test -c Release --logger "console;verbosity=normal"
        env:
          PROTOCOLL_LIB_PATH: ${{ github.workspace }}/build/libprotocoll.so
