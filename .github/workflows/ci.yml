name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  # ── Build + test C++ ──────────────────────────────────────
  cpp:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            compiler: msvc
            cmake_args: ""
          - os: ubuntu-latest
            compiler: gcc
            cmake_args: -DCMAKE_C_COMPILER=gcc-12 -DCMAKE_CXX_COMPILER=g++-12
          - os: ubuntu-latest
            compiler: clang
            cmake_args: -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++

    name: C++ (${{ matrix.compiler }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure --parallel
        timeout-minutes: 5

  # ── TypeScript type-check ─────────────────────────────────
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Type check
        working-directory: bindings/wasm
        run: |
          npm install --save-dev typescript
          npx tsc --noEmit --skipLibCheck

  # ── Release + publish (main only) ─────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [cpp, typescript]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      new_release: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v5
        with:
          extra_plugins: |
            @semantic-release/exec
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Publish npm + upload artifacts ────────────────────────
  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.new_release == 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          ref: v${{ needs.release.outputs.version }}

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@rmnunes"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build C++ library
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_POSITION_INDEPENDENT_CODE=ON
          cmake --build build --config Release --parallel
          cmake --install build --prefix staging/rom

      - name: Package C++ tarball
        run: tar czf rom-v${{ needs.release.outputs.version }}-linux-x64.tar.gz -C staging rom

      - name: Build Python sdist
        run: |
          pip install build cffi
          cd bindings/python && python -m build --sdist
          cp dist/*.tar.gz ../../rom-python-v${{ needs.release.outputs.version }}.tar.gz

      - name: Generate checksums
        run: |
          sha256sum rom-v${{ needs.release.outputs.version }}-linux-x64.tar.gz \
                    rom-python-v${{ needs.release.outputs.version }}.tar.gz > checksums.txt

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.version }}
          files: |
            rom-v${{ needs.release.outputs.version }}-linux-x64.tar.gz
            rom-python-v${{ needs.release.outputs.version }}.tar.gz
            checksums.txt

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "3.1.51"

      - name: Build WASM + publish npm
        working-directory: bindings/wasm
        run: |
          emcmake cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
          cp build/rom_wasm.js dist/ 2>/dev/null || true
          cp build/rom_wasm.wasm dist/ 2>/dev/null || true
          npm install
          npx tsc
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
