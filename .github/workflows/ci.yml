name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── C++ core: build + test ────────────────────────────────
  cpp:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            compiler: msvc
            cmake_args: ""
          - os: ubuntu-latest
            compiler: gcc
            cmake_args: -DCMAKE_C_COMPILER=gcc-12 -DCMAKE_CXX_COMPILER=g++-12
          - os: ubuntu-latest
            compiler: clang
            cmake_args: -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++

    name: C++ (${{ matrix.compiler }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure --parallel
        timeout-minutes: 5

  # ── Rust bindings: check + test ───────────────────────────
  rust:
    name: Rust
    runs-on: ubuntu-latest
    needs: cpp

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build C++ library
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --parallel
          sudo cmake --install build --prefix /usr/local

      - name: Cargo check
        working-directory: bindings/rust
        run: cargo check --workspace

      - name: Cargo test
        working-directory: bindings/rust
        run: cargo test --workspace
        env:
          LD_LIBRARY_PATH: /usr/local/lib

  # ── Python bindings: check + test ─────────────────────────
  python:
    name: Python
    runs-on: ubuntu-latest
    needs: cpp

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build C++ library
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --parallel
          sudo cmake --install build --prefix /usr/local

      - name: Install Python deps
        run: pip install cffi pytest

      - name: Run Python tests
        working-directory: bindings/python
        run: python -m pytest tests/ -v
        env:
          LD_LIBRARY_PATH: /usr/local/lib

  # ── WASM/TypeScript: type-check ───────────────────────────
  wasm:
    name: TypeScript
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Type check
        working-directory: bindings/wasm
        run: |
          npm install --save-dev typescript
          npx tsc --noEmit --skipLibCheck
