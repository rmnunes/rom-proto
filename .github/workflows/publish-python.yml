name: Publish Python

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  publish:
    name: Build sdist & Upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: v${{ inputs.version }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build C++ library
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_POSITION_INDEPENDENT_CODE=ON
          cmake --build build --config Release --parallel
          cmake --install build --prefix staging/rom

      - name: Package C++ tarball
        run: tar czf rom-v${{ inputs.version }}-linux-x64.tar.gz -C staging rom

      - name: Build Python sdist
        run: |
          pip install build cffi
          cd bindings/python && python -m build --sdist
          cp dist/*.tar.gz ../../rom-python-v${{ inputs.version }}.tar.gz

      - name: Generate checksums
        run: |
          sha256sum rom-v${{ inputs.version }}-linux-x64.tar.gz \
                    rom-python-v${{ inputs.version }}.tar.gz > checksums.txt

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: |
            rom-v${{ inputs.version }}-linux-x64.tar.gz
            rom-python-v${{ inputs.version }}.tar.gz
            checksums.txt
