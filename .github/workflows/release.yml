name: Release

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      new_release: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v5
        with:
          extra_plugins: |
            @semantic-release/exec
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Publish workflows (only when a new version is released) ──

  publish-npm:
    name: Publish npm
    needs: release
    if: needs.release.outputs.new_release == 'true'
    uses: ./.github/workflows/publish-npm.yml
    with:
      version: ${{ needs.release.outputs.version }}
    secrets: inherit

  publish-nuget:
    name: Publish NuGet
    needs: release
    if: needs.release.outputs.new_release == 'true'
    uses: ./.github/workflows/publish-nuget.yml
    with:
      version: ${{ needs.release.outputs.version }}
    secrets: inherit

  publish-python:
    name: Publish Python
    needs: release
    if: needs.release.outputs.new_release == 'true'
    uses: ./.github/workflows/publish-python.yml
    with:
      version: ${{ needs.release.outputs.version }}
    secrets: inherit
